services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: orbit-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong@Passw0rd"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql

  redis:
    image: redis:7-alpine
    container_name: orbit-redis
    ports:
      - "6379:6379"

volumes:
  sqlserver-data:
